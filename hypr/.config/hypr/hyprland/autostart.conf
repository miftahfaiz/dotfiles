#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

# exec-once = $terminal
# exec-once = nm-applet &
# exec-once = waybar & hyprpaper & firefox
# exec-once = waybar &
exec-once = qs -c noctalia-shell
exec-once = hyprpaper &
exec-once = dunst
exec-once = udiskie
# exec-once = elephant &

# cliphist
exec-once = wl-paste --type text --watch cliphist store # Store only text data
exec-once = wl-paste --type image --watch cliphist store # Store only image data

# Gnome-keyring
exec-once = gnome-keyring-daemon --start --components=pkcs11,secret,ssh,gpg

# Battery monitor scripts
exec-once = ~/.config/hypr/scripts/battery-monitor.sh &

# Screen sharing
# exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

# WL-clip-persist
exec-once = wl-clip-persist --clipboard regular

# Keychain
# exec-once = ~/.bin/keychain.sh
exec-once = keychain --quiet --eval github_key > ~/.keychain/$HOSTNAME-hyprland
# exec-once = keychain --quiet --eval github_key
